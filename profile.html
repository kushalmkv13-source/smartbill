<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | InvoiceHub HUD</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Mono&display=swap');

        :root {
            --neon-blue: #00d4ff;
            --deep-bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 212, 255, 0.2);
            --success-green: #4ade80;
        }

        body {
            background-color: var(--deep-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hud-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
        }

        .btn-hud-back {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .btn-hud-back:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .profile-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Scanline Animation Effect */
        .profile-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.1);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .avatar-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            padding: 5px;
            overflow: hidden;
            background: var(--deep-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--neon-blue);
            color: #000;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--deep-bg);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .upload-btn:hover {
            transform: scale(1.15) rotate(15deg);
            background: #fff;
        }

        #fileInput { display: none; }

        .role-badge {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .info-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .info-group input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 18px;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            transition: 0.3s;
        }

        .info-group input:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .readonly-field {
            background: rgba(255,255,255,0.02) !important;
            color: #64748b !important;
            cursor: not-allowed;
            border: 1px dashed rgba(255,255,255,0.1) !important;
        }

        .btn-save {
            background: linear-gradient(135deg, #1a6bff, #00d4ff);
            border: none;
            color: white;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 700;
            margin-top: 35px;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-save:active { transform: translateY(0); }

        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr; }
            .profile-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="hud-bg"></div>

    <div class="container profile-container">
        <!-- Header -->
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="btn-hud-back">
                <i class="bi bi-arrow-left"></i>Return to Deck
            </a>
            <span style="font-family: 'Space Mono'; color: var(--success-green); font-size: 0.8rem;">
                <i class="bi bi-record-fill"></i> SYSTEM SECURE
            </span>
        </div>

        <div class="profile-card">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <div class="avatar-circle">
                        <img id="displayAvatar" src="" alt="User Avatar">
                    </div>
                    <label for="fileInput" class="upload-btn" title="Change Profile Picture">
                        <i class="bi bi-camera-fill"></i>
                    </label>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <h2 id="displayNameHeader" class="mt-3 mb-0 fw-bold">Loading...</h2>
                <div id="displayRole" class="role-badge">Access Level: Customer</div>
            </div>

            <!-- Profile Form -->
            <form id="profileForm">
                <div class="info-grid">
                    <div class="info-group">
                        <label>First Name</label>
                        <input type="text" id="editFname" placeholder="Enter first name" required>
                    </div>
                    <div class="info-group">
                        <label>Last Name</label>
                        <input type="text" id="editLname" placeholder="Enter last name" required>
                    </div>
                    <div class="info-group">
                        <label>ID / Email Address</label>
                        <input type="email" id="editEmail" class="readonly-field" readonly>
                    </div>
                    <div class="info-group">
                        <label>Contact Number</label>
                        <input type="text" id="editPhone" placeholder="+91">
                    </div>
                    <div class="info-group">
                        <label>Organization</label>
                        <input type="text" id="editBiz" placeholder="Company Name">
                    </div>
                    <div class="info-group">
                        <label>Account Activation</label>
                        <input type="text" id="displayCreated" class="readonly-field" readonly>
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="bi bi-shield-check me-2"></i> Save Changes to Mainframe
                </button>
            </form>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="profileToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">
              <i class="bi bi-check-circle-fill me-2"></i> Profile data synchronized successfully!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
    </div>

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 1. Data Initialization & Storage Key
      const USER_STORAGE_KEY = "loggedUser";

        // 2. Load and Render Data
     function loadProfile() {

    const user = JSON.parse(localStorage.getItem("loggedUser"));

    if (!user) {

        window.location.href = "login.html";
        return;

    }

    const firstName = user.first_name || "";
    const lastName = user.last_name || "";
    const fullName = (firstName + " " + lastName).trim() || user.username;

    document.getElementById("displayNameHeader").textContent = fullName;

    document.getElementById("displayRole").textContent = "Access: Customer";

    document.getElementById("displayCreated").value = "Active";

    document.getElementById("editFname").value = firstName;

    document.getElementById("editLname").value = lastName;

    document.getElementById("editEmail").value = user.email;

    document.getElementById("editPhone").value = user.phone || "";

    document.getElementById("editBiz").value = user.biz || "";

    document.getElementById("displayAvatar").src =
        `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=00D4FF&color=000&bold=true`;

}
    

        // 3. Handle Profile Picture Upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Optional: Limit file size (e.g., 2MB)
            if (file.size > 2 * 1024 * 1024) {
                alert("File too large. Maximum 2MB allowed.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                
                // Update UI instantly
                document.getElementById("displayAvatar").src = base64Image;

                // Save to LocalStorage
             const user = JSON.parse(localStorage.getItem("loggedUser"));
                user.profilePic = base64Image;
                localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(user));
            };
            reader.readAsDataURL(file);
        });

        // 4. Handle Form Submission
        document.getElementById("profileForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const user = JSON.parse(localStorage.getItem(USER_STORAGE_KEY));
            
            // Collect Form Data
            const fname = document.getElementById("editFname").value.trim();
            const lname = document.getElementById("editLname").value.trim();
            
            // Update Object
            user.first_name = fname;
user.last_name = lname;
            user.phone = document.getElementById("editPhone").value.trim();
            user.biz = document.getElementById("editBiz").value.trim();

            // Save to LocalStorage
            localStorage.setItem("loggedUser", JSON.stringify(user));

            // Update UI Header
            document.getElementById("displayNameHeader").textContent = user.name;

            // Show Feedback
            const toastEl = document.getElementById('profileToast');
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        });

        // Initialize on load
        document.addEventListener("DOMContentLoaded", loadProfile);
    </script>
</body>
</html>
