<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance HUD - Invoice History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* ============================================================
           CLEAN FUTURISTIC HUD STYLING (NO FLOATING ICONS)
           ============================================================ */
        body {
            background: #020617; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .hud-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            /* Focus on the deep radial glow for atmosphere */
            background: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
        }

        /* HUD BACK BUTTON */
        .btn-hud-back {
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            border-radius: 30px;
            padding: 8px 22px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn-hud-back:hover {
            background: #00d4ff;
            color: #020617;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
        }

        /* TABLE UI STYLING */
        .table-glass {
            background: rgba(13, 25, 48, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .text-neon { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
        .badge.success { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid #22c55e; }
        .badge.warning { background: rgba(250, 204, 21, 0.15); color: #facc15; border: 1px solid #facc15; }
        
        .search-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 5px 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            width: fit-content;
        }

        .search-container input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px;
            width: 300px;
            outline: none;
        }

        .history-page { width: 100%; min-height: 100vh; padding: 50px 40px; }

        .empty-icon {
            font-size: 3.5rem;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 15px;
            display: block;
        }
   </style>
</head>
<body>

    <div class="hud-background"></div>

   <div class="container-fluid">
        <main class="history-page">
            
            <a href="dashboard.html" class="btn-hud-back">
                <i class="bi bi-arrow-left"></i> Back To Dashboard
            </a>

            <div class="dashboard-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-white fw-bold"><span class="text-neon">Invoice History</span></h2>
                    
                    <div class="d-flex gap-3">
                        <div class="search-container">
                            <i class="bi bi-search text-info"></i>
                            <input type="text" id="searchInput" placeholder="Search for invoice ID...">
                        </div>
                        <select id="statusFilter" class="form-select bg-dark text-white border-info" style="width: 150px;">
                            <option value="all">All Logs</option>
                            <option value="Paid">Paid</option>
                            <option value="Pending">Pending</option>
                        </select>
                        <button class="btn btn-outline-danger" onclick="clearHistory()">Delete  History</button>
                    </div>
                </div>

                <div class="table-glass">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr class="text-info border-info" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                                <th class="pb-3">S.NO</th>
                                <th class="pb-3">Invoice ID</th>
                                <th class="pb-3">Coustomer Name</th>
                                <th class="pb-3">Product Name</th>
                                <th class="pb-3"> Payment Status</th>
                               <th class="pb-3">Price</th>
<th class="pb-3 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Data dynamically loaded -->
                        </tbody>
                    </table>

                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="bi bi-shield-exclamation empty-icon"></i>
                        <p class="fs-5">Invoice History Not found.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

   <script>

document.addEventListener("DOMContentLoaded", fetchHistory);

document.getElementById("searchInput").addEventListener("input", fetchHistory);

document.getElementById("statusFilter").addEventListener("change", fetchHistory);

async function fetchHistory() {

    const tableBody = document.getElementById("historyTableBody");
    const emptyState = document.getElementById("emptyState");

    const searchTerm = document.getElementById("searchInput").value.toLowerCase();
    const statusFilter = document.getElementById("statusFilter").value;

    tableBody.innerHTML = "";

    try {

      const token = localStorage.getItem("accessToken");

const response = await fetch(
    "http://127.0.0.1:8000/api/invoices/",
    {
        headers:{
            "Authorization":`Bearer ${token}`
        }
    }
);

        const invoices = await response.json();

        const filtered = invoices.filter(invoice => {

            const matchesSearch =
                invoice.invoice_number.toLowerCase().includes(searchTerm) ||
                invoice.customer_name.toLowerCase().includes(searchTerm);

            const matchesStatus =
                statusFilter === "all" ||
                invoice.status === statusFilter;

            return matchesSearch && matchesStatus;

        });

        if(filtered.length===0){

            emptyState.classList.remove("d-none");
            return;

        }

        emptyState.classList.add("d-none");

        filtered.forEach((invoice,index)=>{

         tableBody.innerHTML += `
<tr>

    <td>${index+1}</td>

    <td>${invoice.invoice_number}</td>

    <td>${invoice.customer_name}</td>

    <td>
${
invoice.items.length
?
invoice.items.map(item=>item.product_name).join(", ")
:
"-"
}
</td>
    <td>
        <span class="badge ${invoice.status==="Paid"?"success":"warning"}">
            ${invoice.status}
        </span>
    </td>

    <td>
        ₹ ${parseFloat(invoice.grand_total).toLocaleString("en-IN")}
    </td>

    <td>

    <button class="btn btn-info btn-sm"
            onclick="viewInvoice(${invoice.id})"
            title="View Invoice">
        <i class="bi bi-eye"></i>
    </button>

    
    <button class="btn btn-danger btn-sm"
            onclick="deleteInvoice(${invoice.id})"
            title="Delete Invoice">
        <i class="bi bi-trash"></i>
    </button>

</td>

</tr>
`;

        });

    }

    catch(error){

        console.error(error);

    }

}
async function deleteInvoice(id){

    if(!confirm("Delete this invoice?")) return;

    const token = localStorage.getItem("accessToken");

    try{

        const response = await fetch(

            `http://127.0.0.1:8000/api/invoices/${id}/`,

            {

                method:"DELETE",

                headers:{
                    "Authorization":`Bearer ${token}`
                }

            }

        );

        if(response.ok){

            alert("Invoice Deleted Successfully");

            fetchHistory();

        }

    }

    catch(error){

        console.error(error);

    }

}
async function viewInvoice(id){

    const token = localStorage.getItem("accessToken");

    try{

        const response = await fetch(

            `http://127.0.0.1:8000/api/invoices/${id}/`,

            {

                headers:{

                    "Authorization":`Bearer ${token}`

                }

            }

        );

        const invoice = await response.json();

        console.log(invoice);

        alert(

`Invoice : ${invoice.invoice_number}

Customer : ${invoice.customer_name}

Amount : ₹${invoice.grand_total}

Status : ${invoice.status}`

        );

    }

    catch(error){

        console.error(error);

    }

}
async function downloadInvoice(id){

    const token = localStorage.getItem("accessToken");

    try{

        const response = await fetch(

            `http://127.0.0.1:8000/api/invoices/${id}/`,

            {

                headers:{
                    "Authorization":`Bearer ${token}`
                }

            }

        );

        if(!response.ok){

            throw new Error("Unable to load invoice.");

        }

        const invoice = await response.json();

        // Store invoice temporarily
        localStorage.setItem(
            "selectedInvoice",
            JSON.stringify(invoice)
        );

        // Open preview page
        window.open(
            `invoice-preview.html?id=${id}`,
            "_blank"
        );

    }

    catch(error){

        console.error(error);

        alert("Unable to download invoice.");

    }

}
async function clearHistory() {
    const token = localStorage.getItem("accessToken");

    if (!confirm("Delete all invoices?")) return;

    try {

       const response = await fetch(
    "http://127.0.0.1:8000/api/invoices/",
    {
        headers:{
            "Authorization":`Bearer ${token}`
        }
    }
); 

        const invoices = await response.json();

        for (const invoice of invoices) {

           await fetch(

`http://127.0.0.1:8000/api/invoices/${invoice.id}/`,

{

method:"DELETE",

headers:{

"Authorization":`Bearer ${token}`

}

}

);
        }

        alert("All invoice history deleted successfully.");

        fetchHistory();

    } catch (error) {

        console.error(error);

        alert("Error deleting history.");

    }

}



    </script>
</body>
</html>
