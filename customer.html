<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Billing - Enterprise Control Panel</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-dark: #050b14;
            --surface-glass: rgba(10, 22, 37, 0.7);
            --border-glass: rgba(0, 212, 255, 0.15);
            --primary: #0A84FF;
            --secondary: #4DA3FF;
            --accent-glow: #00D4FF;
            --text-main: #FFFFFF;
            --text-muted: #9EAEB8;
            --success-glow: #00FFCC;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-columns: 460px 1fr; 
            overflow: hidden;
            position: relative;
        }

        #gridCanvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none;
        }

        /* --- BACK BUTTON STYLES --- */
        .nav-header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .back-dashboard-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(10, 132, 255, 0.1);
            border: 1px solid var(--border-glass);
            color: var(--accent-glow);
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-dashboard-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.4);
            transform: translateX(5px);
        }

        /* LEFT SIDE */
     .control-deck {
    background: linear-gradient(180deg, rgba(10,22,37,.9) 0%, rgba(5,11,20,.98) 100%);
    border-right:1px solid var(--border-glass);
    backdrop-filter:blur(20px);
    padding:5rem 2rem 1.5rem;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}
.control-deck > div:first-child{
    flex:1;
    min-height:0;
    display:flex;
    flex-direction:column;
}
        /* RIGHT SIDE */
        .ledger-view {
            background: rgba(7, 17, 31, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .ledger-header {
            padding: 1.75rem 2.5rem;
            background: rgba(10, 22, 37, 0.5);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.35rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--text-main); text-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
            display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.5rem;
        }

       .form-container{
    margin-top:1rem;
    display:flex;
    flex-direction:column;
    gap:1rem;
    flex:1;
    overflow-y:auto;
    padding-right:8px;
}

        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        input {
            width: 100%; padding: 0.85rem 1.1rem; background: rgba(5, 11, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 8px; color: var(--text-main); transition: all 0.25s ease;
        }
        input:focus { outline: none; border-color: var(--accent-glow); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

       .deck-footer{
    flex-shrink:0;
    border-top:1px solid rgba(255,255,255,.08);
    padding-top:15px;
    margin-top:15px;
    background:#07111f;
}

        .action-btn {
            background: linear-gradient(135deg, var(--primary) 0%, #0052D4) 100%;
            color: #ffffff; border: none; padding: 0.9rem; border-radius: 8px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .action-btn.secondary-action { background: rgba(10, 22, 37, 0.8); border: 1px solid var(--border-glass); color: var(--accent-glow); }
        .action-btn:hover { box-shadow: 0 0 22px rgba(0, 212, 255, 0.6); transform: translateY(-1px); }

        /* TABLE STYLES */
        .table-wrapper { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 1.25rem 2.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        th { position: sticky; top: 0; background-color: #08121f; color: var(--secondary); font-size: 0.85rem; text-transform: uppercase; z-index: 1; }
        tr:hover { background-color: rgba(10, 132, 255, 0.05); }

        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: 0.2s; margin-right: 10px; }
        .btn-icon:hover { color: var(--accent-glow); }
        .btn-delete:hover { color: var(--danger); }

        /* MODAL */
        .invoice-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 7, 13, 0.85);
            backdrop-filter: blur(12px); z-index: 100; display: none; align-items: center; justify-content: center;
        }
        .invoice-overlay.active { display: flex; }
        .invoice-box { background: #0c1625; border: 1px solid var(--accent-glow); width: 650px; border-radius: 12px; padding: 2.5rem; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .standard-badge { background: rgba(0, 212, 255, 0.1); color: var(--accent-glow); border: 1px solid var(--accent-glow); }
    </style>
</head>
<body>

<!-- Floating Back Button -->
<div class="nav-header">
    <a href="dashboard.html" class="back-dashboard-btn">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</div>

<canvas id="gridCanvas"></canvas>

<section class="control-deck">
    <div>
        <h2 class="section-title"><i class="bx bx-id-card"></i> Profile Entry</h2>
        <form id="billingForm" class="form-container">
            <input type="hidden" id="edit-index" value="-1">
           
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="cust-name" placeholder="Alex Rivera" required>
            </div>
            <div class="input-group">
                <label>Contact Number</label>
               <input
    type="tel"
    id="cust-phone"
    placeholder="Enter 10-digit Mobile Number"
    maxlength="10"
    pattern="[0-9]{10}"
    inputmode="numeric"
    required
>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="cust-email" placeholder="alex@example.com" required>
            </div>
        
           <div class="input-group">
    <label>GST Number</label>
    <input type="text"
           id="cust-gst"
           placeholder="Enter GST Number">
</div>

<div class="input-group">
    <label>Street Address</label>
    <input type="text"
           id="cust-address"
           placeholder="Enter Street Address">
</div>

<div class="input-group">
    <label>City</label>
    <input type="text"
           id="cust-city"
           placeholder="Enter City">
</div>

<div class="input-group">
    <label>State</label>
    <input type="text"
           id="cust-state"
           placeholder="Enter State">
</div>

<div class="input-group">
    <label>Pincode</label>
    <input type="text"
           id="cust-pincode"
           placeholder="Enter Pincode">
</div>
        </form>
    </div>

    <div class="deck-footer">
        <p style="font-size: 0.75rem; color: var(--text-muted);">Status: <span id="status-text" style="color: var(--success-glow);">Ready</span></p>
        <div class="action-button-group">
            <button type="button" onclick="clearForm()" class="action-btn secondary-action">Reset</button>
            <button type="button" id="submitBtn" class="action-btn"><i class="bx bx-check-shield"></i> Commit</button>
        </div>
    </div>
</section>

<main class="ledger-view">
    <header class="ledger-header">
        <h3 class="section-title"><i class="bx bx-server"></i> Active Ledger</h3>
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Invoice ID</th>
                    <th>Customer Name</th>
                    <th>Contact</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<!-- Invoice Modal -->
<div class="invoice-overlay" id="invoiceOverlay">
    <div class="invoice-box">
        <h2 style="color:var(--accent-glow)">INVOICE PREVIEW</h2>
        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #333;">
        <div id="invoiceContent" style="line-height: 1.8;"></div>
        <button class="action-btn" style="margin-top:20px; width:100%" onclick="closeInvoice()">Close Manifest</button>
    </div>
</div>

<script>
    // --- CANVAS ANIMATION ---
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
        for(let i=0; i<canvas.width; i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=50){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        requestAnimationFrame(animate);
    }
    animate();

    // --- CORE LOGIC ---
    const form = document.getElementById('billingForm');
    const tableBody = document.getElementById('tableBody');
    const editIndexField = document.getElementById('edit-index');

    // Allow only 10 digits
document.getElementById("cust-phone").addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, "").slice(0, 10);
});
    

async function renderTable() {

   const token = localStorage.getItem("accessToken");

const response = await fetch(
    "http://127.0.0.1:8000/api/customers/",
    {
        headers: {
            "Authorization": `Bearer ${token}`
        }
    }
); 

    const customers = await response.json();

   console.log("Customer API Status:", response.status);
   console.log("Customer API Response:", customers);

    tableBody.innerHTML = "";

    customers.forEach(customer => {

        tableBody.innerHTML += `
        <tr>

           <td>INV-${String(customer.id).padStart(6,'0')}</td>

            <td>
                <strong>${customer.full_name}</strong>
            </td>

            <td>
                ${customer.phone}<br>
                <small>${customer.email ?? ""}</small>
            </td>

            <td>
                ${customer.address}
            </td>

            <td>

                <button class="btn-icon"
                    onclick="editCustomer(${customer.id})">

                    <i class="bx bx-edit-alt"></i>

                </button>

                <button class="btn-icon btn-delete"
                    onclick="deleteCustomer(${customer.id})">

                    <i class="bx bx-trash"></i>

                </button>

            </td>

        </tr>
        `;

    });

}
document.getElementById("submitBtn").addEventListener("click", saveCustomer);
async function saveCustomer() {

    const customer = {

    full_name: document.getElementById("cust-name").value.trim(),

    phone: document.getElementById("cust-phone").value.trim(),

    email: document.getElementById("cust-email").value.trim(),

    gst_number: document.getElementById("cust-gst").value.trim(),

    address: document.getElementById("cust-address").value.trim(),

    city: document.getElementById("cust-city").value.trim(),

    state: document.getElementById("cust-state").value.trim(),

    pincode: document.getElementById("cust-pincode").value.trim()

};
   const token = localStorage.getItem("accessToken");

const response = await fetch(
    "http://127.0.0.1:8000/api/customers/",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(customer)
    }
);

if (response.ok) {

    alert("Customer Added Successfully");

clearForm();

renderTable();

} else {

    const error = await response.json();

    console.log(error);

    alert(JSON.stringify(error));

}
}
function clearForm() {

    form.reset();

    editIndexField.value = "-1";

    document.getElementById("submitBtn").innerHTML =
        '<i class="bx bx-check-shield"></i> Commit';

}
async function deleteCustomer(id) {

    if (!confirm("Delete this customer?")) return;
const token = localStorage.getItem("accessToken");

const response = await fetch(
    `http://127.0.0.1:8000/api/customers/${id}/`,
    {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    }
);
    if (response.ok) {

        alert("Customer Deleted");

        renderTable();

    } else {

        alert("Delete Failed");

    }

}
function editCustomer(id) {

    alert("Edit Customer - Next Step");

}



    function closeInvoice() {
        document.getElementById('invoiceOverlay').classList.remove('active');
    }

    // Initialize
   
    renderTable();
</script>
</body>
</html>
